<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="32" fill="#ffffff" />
  <svg x="10" y="10" width="44" height="44" viewBox="6 4 52 52">
    <!-- Antenna -->
    <line x1="32" y1="18" x2="32" y2="8" stroke="#003d29" stroke-width="4" stroke-linecap="round"/>
    <circle cx="32" cy="8" r="4" fill="#d4af37"/>
    <!-- Robot Head Base -->
    <rect x="12" y="18" width="40" height="38" rx="8" fill="#006241"/>
    <!-- Bottom Jaw Shading -->
    <rect x="12" y="44" width="40" height="12" rx="4" fill="#004d33"/>
    <!-- Ears / Bolts -->
    <rect x="6" y="30" width="6" height="14" rx="2" fill="#003d29"/>
    <rect x="52" y="30" width="6" height="14" rx="2" fill="#003d29"/>
    <!-- Left Googly Eye Base -->
    <circle cx="24" cy="32" r="9" fill="#ffffff"/>
    <circle cx="25" cy="35" r="3.5" fill="#1e3932"/>
    <circle cx="26" cy="36" r="1" fill="#ffffff"/>
    <!-- Right Googly Eye Base -->
    <circle cx="40" cy="32" r="9" fill="#ffffff"/>
    <circle cx="42" cy="29" r="4" fill="#1e3932"/>
    <circle cx="42.5" cy="28.5" r="1" fill="#ffffff"/>
    <!-- Mouth -->
    <line x1="24" y1="50" x2="40" y2="50" stroke="#edebe4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="48" x2="28" y2="52" stroke="#edebe4" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="48" x2="32" y2="52" stroke="#edebe4" stroke-width="2" stroke-linecap="round"/>
    <line x1="36" y1="48" x2="36" y2="52" stroke="#edebe4" stroke-width="2" stroke-linecap="round"/>
  </svg>
</svg>
